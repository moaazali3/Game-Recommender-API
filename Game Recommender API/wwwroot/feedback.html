<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback - Game Recommender</title>
    <meta name="description" content="A smart game recommendation engine and series timeline tracker based on Steam reviews and AI. Find what to play next!">
    <meta name="keywords" content="game recommendations, play next, game timeline, PC games, Steam alternatives">
    <meta property="og:title" content="Game Recommender - Feedback">
    <meta property="og:description" content="Discover your next favorite game and explore chronological series timelines.">
    <meta property="og:image" content="http://game-recommender.runasp.net/cover-image.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VMPFBZ8ZSD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-VMPFBZ8ZSD');
    </script>
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="top-nav">
        <button id="langToggleBtn" class="nav-btn" data-i18n="lang_toggle">🌐 AR</button>
        <button class="nav-btn" onclick="window.location.href='index.html'" data-i18n="back_to_search">Back to Search</button>
    </div>

    <main class="container">
        <section class="hero" style="margin-top: 8vh; margin-bottom: 2rem;">
            <p style="color: var(--text-muted); font-size: 1.2rem;" data-i18n="feedback_subtitle">Help us improve the gaming multiverse.</p>
        </section>

        <section class="feedback-section" style="width: 100%; max-width: 600px;">
            <div class="glass-panel" style="padding: 2.5rem;">
                <form id="feedbackForm">
                    <div style="margin-bottom: 2rem;">
                        <label style="display: block; font-weight: 600; margin-bottom: 0.8rem; color: white;" data-i18n="feedback_rate_label">Rate your experience</label>
                        <div class="star-rating" id="starRating">
                            <span data-value="1">★</span>
                            <span data-value="2">★</span>
                            <span data-value="3">★</span>
                            <span data-value="4">★</span>
                            <span data-value="5" class="active">★</span>
                        </div>
                        <input type="hidden" id="ratingValue" value="5">
                    </div>

                    <div style="margin-bottom: 2rem;">
                        <label for="feedbackText" style="display: block; font-weight: 600; margin-bottom: 0.8rem; color: white;" data-i18n="feedback_thoughts_label">Your Thoughts</label>
                        <textarea id="feedbackText" rows="5" placeholder="Tell us what you think..." data-i18n="feedback_placeholder" style="width: 100%; padding: 1rem; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: white; font-family: inherit; font-size: 1rem; resize: vertical;" required></textarea>
                    </div>

                    <button type="submit" id="submitFeedbackBtn" data-i18n="feedback_send_btn" style="width: 100%;">Send Feedback</button>
                </form>

                <div id="feedbackSuccess" class="hidden" style="text-align: center; padding: 2rem 0;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2" style="width: 64px; height: 64px; margin-bottom: 1rem;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    <h2 style="color: white; margin-bottom: 0.5rem;" data-i18n="feedback_thanks_title">Thank You!</h2>
                    <p style="color: var(--text-muted);" data-i18n="feedback_thanks_desc">Your feedback has been submitted successfully.</p>
                </div>
                
                <div id="feedbackError" class="hidden error-card" style="margin-top: 1rem; padding: 1.5rem;">
                    <h3 style="font-size: 1.2rem; margin-bottom: 0.5rem;" data-i18n="feedback_error_title">Error</h3>
                    <p data-i18n="feedback_error_desc">Failed to submit feedback. Please try again.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="lang.js?v=2"></script>
    <script src="feedback.js?v=2"></script>
</body>
</html>
